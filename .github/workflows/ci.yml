name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --omit peer

      - name: Lint
        run: bunx --bun oxlint .

      - name: Format check
        run: bunx --bun oxfmt --check --config .oxfmt.json .
